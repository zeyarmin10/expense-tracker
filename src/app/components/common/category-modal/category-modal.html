<div class="modal fade" id="categoryModal" tabindex="-1" aria-labelledby="categoryModalLabel" aria-hidden="true"
  #categoryModal data-bs-backdrop="static" data-bs-keyboard="false">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="categoryModalLabel">{{ (isEditMode ? 'EDIT_CATEGORY_TITLE' : 'CATEGORY_MODAL_TITLE')
          | translate }}</h5>
        <button type="button" class="btn-close" (click)="closeModal()"></button>
      </div>
      <div class="modal-body">
        <form [formGroup]="categoryForm" (ngSubmit)="onSave()">
          <div class="input-group mb-3">
            <input type="text" class="form-control" formControlName="name"
              placeholder="{{ 'CATEGORY_NAME_PLACEHOLDER' | translate }}">
            <button class="btn btn-primary" type="submit" [disabled]="categoryForm.invalid">
              <fa-icon [icon]="isEditMode ? faSave : faPlus"></fa-icon>
            </button>
          </div>
        </form>
        <ul class="list-group">
          <li *ngFor="let category of categories"
            class="list-group-item d-flex justify-content-between align-items-center">
            {{ category.name }}
            <div>
              <button class="btn btn-sm btn-outline-primary me-2" (click)="onEdit(category)">
                <fa-icon [icon]="faEdit"></fa-icon>
              </button>
              <button class="btn btn-sm btn-outline-danger" (click)="onDelete(category.id!)"
                [disabled]="isDeleting(category.id!)">
                <fa-icon [icon]="faTrash"></fa-icon>
              </button>
            </div>
          </li>
        </ul>
      </div>
    </div>
  </div>
</div>
