<div class="modal fade" id="customBudgetPeriodModal" tabindex="-1" aria-labelledby="customBudgetPeriodModalLabel"
  aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
  <div class="modal-dialog cbp-dialog">
    <div class="modal-content cbp-content">

      <!-- Top accent line -->
      <div class="cbp-accent-line"></div>

      <!-- Header -->
      <div class="cbp-header">
        <div class="cbp-title-wrap">
          <span class="cbp-icon"><lucide-icon [img]="iconCalendarRange" [size]="16" class="calendar-range-icon"></lucide-icon></span>
          <h5 class="cbp-title" id="customBudgetPeriodModalLabel">
            {{ 'CREATE_CUSTOM_BUDGET_PERIOD' | translate }}
          </h5>
        </div>
        <button type="button" class="cbp-close-btn" (click)="close()">
          <lucide-icon [img]="iconTimes" [size]="16"></lucide-icon>
        </button>
      </div>

      <!-- Body -->
      <div class="cbp-body">
        <form [formGroup]="budgetPeriodForm">

          <!-- Period Name -->
          <div class="cbp-fl-wrap mb-3">
            <input type="text" class="cbp-fl-input" id="budgetName" formControlName="name" placeholder=" "
              maxlength="50" autocomplete="off" />
            <label class="cbp-fl-label" for="budgetName">
              {{ 'BUDGET_PERIOD_NAME' | translate }}
            </label>
          </div>

          <!-- Date Row -->
          <div class="cbp-date-row">
            <div class="cbp-fl-wrap">
              <input type="date" class="cbp-fl-input cbp-has-val" id="modalBudgetStartDate" formControlName="startDate"
                placeholder=" " />
              <label class="cbp-fl-label" for="modalBudgetStartDate">
                {{ 'START_DATE' | translate }}
              </label>
            </div>
            <div class="cbp-fl-wrap">
              <input type="date" class="cbp-fl-input cbp-has-val" id="modalBudgetEndDate" formControlName="endDate"
                placeholder=" " />
              <label class="cbp-fl-label" for="modalBudgetEndDate">
                {{ 'END_DATE' | translate }}
              </label>
            </div>
          </div>

        </form>
      </div>

      <!-- Footer -->
      <div class="cbp-footer">
        <button type="button" class="cbp-save-btn" (click)="save()" [disabled]="!budgetPeriodForm.valid">
          <lucide-icon [img]="iconSave" [size]="16"></lucide-icon>
          <span>{{ 'SAVE_BUTTON_LABEL' | translate }}</span>
        </button>
      </div>

    </div>
  </div>
</div>
