<svg class="wt-overlay" *ngIf="spotlight">
  <defs>
    <mask id="wt-mask">
      <rect x="0" y="0" width="100%" height="100%" fill="white"></rect>
      <rect
        class="wt-spotlight-shape"
        [attr.x]="spotlight.x"
        [attr.y]="spotlight.y"
        [attr.width]="spotlight.width"
        [attr.height]="spotlight.height"
        [attr.rx]="spotlight.rx"
        [attr.ry]="spotlight.rx"
        fill="black"
      ></rect>
    </mask>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" class="wt-scrim" mask="url(#wt-mask)"></rect>
</svg>

<!-- Full backdrop fallback for the rare case a target never resolves -->
<div class="wt-backdrop-fallback" *ngIf="!spotlight"></div>

<div
  class="wt-ring"
  *ngIf="spotlight"
  [style.top.px]="spotlight.y"
  [style.left.px]="spotlight.x"
  [style.width.px]="spotlight.width"
  [style.height.px]="spotlight.height"
  [style.border-radius.px]="spotlight.rx"
></div>

<div
  class="wt-tooltip"
  [style.width.px]="tooltipWidth"
  [style.top]="tooltipStyle['top']"
  [style.bottom]="tooltipStyle['bottom']"
  [style.left]="tooltipStyle['left']"
  [style.transform]="tooltipStyle['transform']"
>
  <button type="button" class="wt-skip" (click)="skip()">
    {{ 'TOUR_SKIP' | translate }}
  </button>

  <h3 class="wt-title">{{ steps[currentStep].titleKey | translate }}</h3>
  <p class="wt-desc">{{ steps[currentStep].descKey | translate }}</p>

  <div class="wt-dots">
    <button
      type="button"
      class="wt-dot"
      *ngFor="let step of steps; let i = index; trackBy: trackByStep"
      [class.active]="i === currentStep"
      (click)="goToStep(i)"
      [attr.aria-label]="'Step ' + (i + 1)"
    ></button>
  </div>

  <div class="wt-actions">
    <button type="button" class="wt-back-btn" *ngIf="currentStep > 0" (click)="back()">
      {{ 'BACK_BUTTON' | translate }}
    </button>
    <button type="button" class="wt-next-btn" (click)="next()">
      <span>{{ (isLastStep ? 'TOUR_GET_STARTED' : 'TOUR_NEXT') | translate }}</span>
      <lucide-icon *ngIf="!isLastStep" [img]="iconArrowRight" [size]="16"></lucide-icon>
      <lucide-icon *ngIf="isLastStep" [img]="iconCheck" [size]="16"></lucide-icon>
    </button>
  </div>
</div>
