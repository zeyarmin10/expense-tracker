<div class="container my-4">
  <div class="row justify-content-center">
    <div class="col-md-10 col-lg-8 col-xl-7">

      <!-- Invite New Member -->
      <div class="card shadow-sm mb-4">
        <div class="card-body">
          <h5 class="card-title"><fa-icon [icon]="faUserPlus"></fa-icon> {{ 'INVITE_NEW_MEMBER' | translate }}</h5>
          <div class="input-group">
            <input type="email" class="form-control" [placeholder]="'EMAIL_PLACEHOLDER' | translate" [(ngModel)]="newMemberEmail" (keyup.enter)="sendInvite()">
            <button class="btn btn-primary" (click)="sendInvite()" [disabled]="isSending">
              <fa-icon [icon]="faPaperPlane" *ngIf="!isSending"></fa-icon>
              <span *ngIf="isSending" class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
            </button>
          </div>
        </div>
      </div>

      <!-- Pending Invites -->
      <div *ngIf="(pendingInvites$ | async)?.length ?? 0 > 0" class="card shadow-sm mb-4">
        <div class="card-body">
          <h5 class="card-title"><fa-icon [icon]="faInbox"></fa-icon> {{ 'PENDING_INVITATIONS' | translate }}</h5>
          <ul class="list-group list-group-flush">
            <li *ngFor="let invite of pendingInvites$ | async" class="list-group-item d-flex justify-content-between align-items-center">
              <div class="d-flex align-items-center">
                <fa-icon [icon]="faEnvelope" class="me-3 text-secondary"></fa-icon>
                <span>{{ invite.email }}</span>
              </div>
              <button class="btn btn-sm btn-outline-warning" (click)="confirmRevokeInvite(invite.key)">
                <fa-icon [icon]="faUserSlash"></fa-icon>
              </button>
            </li>
          </ul>
        </div>
      </div>

      <!-- Current Members -->
      <div class="card shadow-sm">
        <div class="card-body">
          <h5 class="card-title"><fa-icon [icon]="faInbox"></fa-icon> {{ 'CURRENT_MEMBERS' | translate }}</h5>
          <ul class="list-group list-group-flush">
            <li *ngFor="let member of members$ | async" class="list-group-item d-flex justify-content-between align-items-center">
              <div class="d-flex align-items-center">
                <fa-icon [icon]="faUserCircle" class="me-3" [style.color]="getAvatarColor(member.displayName!)" size="2x"></fa-icon>
                <div>
                  <div class="fw-bold">{{ member.displayName }}</div>
                  <small class="text-muted">{{ member.role }}</small>
                </div>
              </div>
              <button class="btn btn-sm btn-outline-danger" *ngIf="(groupOwnerId$ | async) === (userProfile$ | async)?.uid && member.uid !== (userProfile$ | async)?.uid" (click)="confirmDeleteMember(member.uid)">
                <fa-icon [icon]="faTrash"></fa-icon>
              </button>
            </li>
          </ul>
        </div>
      </div>

    </div>
  </div>
</div>
