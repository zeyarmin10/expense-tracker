<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<div class="cat-wrapper">
  <div class="cat-container">

    <!-- ── Page Header ── -->
    <div class="cat-page-header">
      <h2 class="cat-page-title">
        <fa-icon [icon]="faTags" class="cat-icon-accent"></fa-icon>
        {{ "CREATE_CATEGORY_TITLE" | translate }}
      </h2>
    </div>

    <!-- ── Add Category Panel ── -->
    <div class="cat-panel">
      <form [formGroup]="addCategoryForm" (ngSubmit)="onAddSubmit()" class="cat-add-form">
        <div class="cat-fl-wrap">
          <input
            type="text"
            id="newCategoryName"
            class="cat-fl-input"
            formControlName="name"
            placeholder=" "
            [class.err]="addCategoryForm.controls['name'].invalid && addCategoryForm.controls['name'].touched"
          />
          <label class="cat-fl-label" for="newCategoryName">
            {{ "CATEGORY_NAME_LABEL" | translate }}
          </label>
        </div>
        <div *ngIf="addCategoryForm.controls['name'].invalid && addCategoryForm.controls['name'].touched"
          class="cat-error">
          {{ "CATEGORY_NAME_REQUIRED" | translate }}
        </div>
        <div class="cat-add-footer">
          <button type="submit" class="cat-btn cat-btn-primary"
            [disabled]="addCategoryForm.invalid">
            <fa-icon [icon]="faSave"></fa-icon>
            {{ "SAVE_BUTTON_LABEL" | translate }}
          </button>
        </div>
      </form>
    </div>

    <!-- ── Category List ── -->
    <div class="cat-list-panel">

      <div class="cat-list-header">
        <h3 class="cat-list-title">
          <fa-icon [icon]="faTags" class="cat-icon-success"></fa-icon>
          {{ "EXISTING_CATEGORIES_TITLE" | translate }}
        </h3>
        <span class="cat-count-badge" *ngIf="(categories$ | async) as cats">
          {{ cats.length }}
        </span>
      </div>

      <!-- Empty state -->
      <div *ngIf="(categories$ | async)?.length === 0" class="cat-empty">
        {{ "NO_CATEGORIES_FOUND" | translate }}
      </div>

      <!-- List -->
      <div class="cat-list">
        <div *ngFor="let category of categories$ | async" class="cat-item">

          <!-- View mode -->
          <ng-container *ngIf="editingCategoryId !== category.id; else editMode">
            <div class="cat-item-inner">
              <span class="cat-item-name">{{ category.name }}</span>
              <div class="cat-item-actions">
                <button class="cat-action-btn cat-action-edit"
                  (click)="startEdit(category)"
                  [disabled]="editingCategoryId !== null"
                  [attr.aria-label]="'EDIT_BUTTON_LABEL' | translate">
                  <fa-icon [icon]="faEdit"></fa-icon>
                </button>
                <button class="cat-action-btn cat-action-delete"
                  (click)="onDelete(category.id!)"
                  [disabled]="editingCategoryId !== null"
                  [attr.aria-label]="'DELETE_BUTTON_LABEL' | translate">
                  <fa-icon [icon]="faTrash"></fa-icon>
                </button>
              </div>
            </div>
          </ng-container>

          <!-- Edit mode -->
          <ng-template #editMode>
            <div class="cat-item-edit">
              <div class="cat-fl-wrap cat-fl-wrap-edit">
                <input
                  type="text"
                  [id]="'edit-' + category.id"
                  class="cat-fl-input"
                  [formControl]="editingCategoryFormControl!"
                  placeholder=" "
                  [class.err]="editingCategoryFormControl!.invalid && editingCategoryFormControl!.touched"
                  (keydown.enter)="onUpdateInline(category.id!)"
                />
                <label class="cat-fl-label" [for]="'edit-' + category.id">
                  {{ "CATEGORY_NAME_LABEL" | translate }}
                </label>
              </div>
              <div *ngIf="editingCategoryFormControl!.invalid && editingCategoryFormControl!.touched"
                class="cat-error">
                {{ "CATEGORY_NAME_REQUIRED" | translate }}
              </div>
              <div class="cat-edit-actions">
                <button class="cat-btn cat-btn-ghost cat-btn-sm" (click)="cancelEdit()">
                  <fa-icon [icon]="faTimes"></fa-icon>
                  {{ "CANCEL_BUTTON_LABEL" | translate }}
                </button>
                <button class="cat-btn cat-btn-primary cat-btn-sm"
                  (click)="onUpdateInline(category.id!)"
                  [disabled]="editingCategoryFormControl?.invalid">
                  <fa-icon [icon]="faSave"></fa-icon>
                  {{ "SAVE_BUTTON_LABEL" | translate }}
                </button>
              </div>
            </div>
          </ng-template>

        </div>
      </div>

    </div>
    <!-- ── END list panel ── -->

  </div>
</div>
