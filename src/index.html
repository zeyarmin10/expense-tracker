<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Kyat Wise</title>
    <base href="/">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
      html, body { background: #020817; margin: 0; }
      html.theme-light, html.theme-light body { background: #ffffff; }
    </style>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('appTheme') || localStorage.getItem('theme') || 'dark';
          var isDark = t === 'dark' || (t !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (!isDark) document.documentElement.classList.add('theme-light');
        } catch (e) {}
      })();
    </script>
</head>

<body class="mat-typography">
    <app-root></app-root>
</body>

</html>
